name: Deploy

on:
  workflow_run:
    workflows: ["CI - Build & Test"]
    types:
      - completed
    branches: [main]

jobs:
  deploy-client-vercel:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy Client to Vercel
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      run: |
        if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
          echo "⚠️  Vercel credentials not configured. Skipping Vercel deployment."
          echo "To enable Vercel deployment, add these secrets to your GitHub repository:"
          echo "  - VERCEL_TOKEN"
          echo "  - VERCEL_PROJECT_ID"
          echo "  - VERCEL_ORG_ID (optional)"
          exit 0
        fi
        
        npm install -g vercel
        vercel --prod --token=$VERCEL_TOKEN --yes --cwd client
    
    - name: Deployment Status
      if: always()
      run: echo "Client deployment completed"

  deploy-server:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Server Deployment (Manual)
      run: |
        echo "🚀 Server deployment ready"
        echo ""
        echo "Choose your deployment target:"
        echo "1. Railway (Recommended for Node.js)"
        echo "2. Heroku"
        echo "3. Azure App Service"
        echo "4. AWS Lambda"
        echo "5. DigitalOcean"
        echo ""
        echo "To automate server deployment, add the appropriate secrets and uncomment the deployment step in .github/workflows/deploy.yml"

  notify-deployment:
    needs: [deploy-client-vercel, deploy-server]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Deployment Summary
      run: |
        echo "📦 Deployment Summary"
        echo "✓ Client deployment status: ${{ needs.deploy-client-vercel.result }}"
        echo "✓ Server deployment status: ${{ needs.deploy-server.result }}"
        echo ""
        echo "Check the Actions tab for detailed logs"
